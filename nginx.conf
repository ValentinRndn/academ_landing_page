server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;

    # Long cache for fingerprinted Astro assets.
    location ~* ^/_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Long cache for images / fonts.
    location ~* \.(?:jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Sitemap / robots.
    location ~* ^/(sitemap-index\.xml|sitemap-\d+\.xml|robots\.txt)$ {
        try_files $uri =404;
    }

    # Astro generates one index.html per route (e.g. /fr/index.html).
    # try_files lets nginx find the right file for clean URLs:
    #   /            → /index.html
    #   /fr          → /fr/index.html
    #   /fr/         → /fr/index.html
    #   /mentions-legales → /mentions-legales/index.html
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html /index.html;
    }

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS — Coolify usually terminates TLS in front, but no harm in setting it.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Custom 404 (Astro generates dist/404.html if you add src/pages/404.astro).
    error_page 404 /404.html;
}
